<!DOCTYPE html>
<html lang="en" class="light"> 
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking - User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-900 dark:to-slate-800 min-h-screen flex items-center justify-center p-6 font-sans text-slate-800 transition-colors duration-300">
    
    <button onclick="toggleTheme()" class="absolute top-6 right-6 p-3 bg-white dark:bg-slate-700 rounded-full shadow-md hover:scale-110 transition-transform">
        <span id="themeIcon" class="text-xl">🌙</span>
    </button>

    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8 w-full max-w-4xl text-center transition-colors duration-300">
        <h1 class="text-3xl font-extrabold text-slate-700 dark:text-white mb-2">Smart Parking System</h1>
        <p id="aiWelcome" class="text-slate-500 dark:text-slate-300 mb-6 font-medium italic animate-pulse">Consulting the AI for a greeting...</p>
        
        <div class="flex flex-col md:flex-row gap-3 justify-center mb-4">
            <select id="typeInput" title="Select Vehicle Type" class="px-4 py-3 border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg focus:outline-none focus:border-blue-500">
                <option value="Car">🚗 Car</option>
                <option value="Bike">🏍️ Bike</option>
            </select>
            <input type="text" id="plateInput" placeholder="Enter License Plate (MH-31-AB-1234)" 
                   class="w-full md:w-1/2 px-4 py-3 border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg focus:outline-none focus:border-blue-500">
            <button onclick="parkVehicle()" 
                    class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition-all active:scale-95">
                Park Vehicle
            </button>
        </div>
        
        <p id="message" class="h-6 font-bold text-sm mb-4"></p>

        <div id="parkingGrid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-4 mt-6"></div>

        <div class="mt-8">
            <a href="admin.html" class="text-blue-500 hover:text-blue-400 font-semibold hover:underline transition-colors">Go to Admin Panel &rarr;</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
