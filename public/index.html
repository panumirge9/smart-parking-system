<!DOCTYPE html>
<html lang="en" class="light"> 
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking - User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-900 dark:to-slate-800 min-h-screen flex items-center justify-center p-6 font-sans text-slate-800 transition-colors duration-300">
    
    <button onclick="toggleTheme()" class="absolute top-6 right-6 p-3 bg-white dark:bg-slate-700 rounded-full shadow-md hover:scale-110 transition-transform">
        <span id="themeIcon" class="text-xl">🌙</span>
    </button>
<button onclick="logout()" class="absolute top-6 right-20 text-sm font-bold text-red-500 hover:text-red-600 bg-white dark:bg-slate-700 px-4 py-2 rounded-lg shadow-md no-print">
    Logout
</button>
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8 w-full max-w-4xl text-center transition-colors duration-300">
        <h1 class="text-3xl font-extrabold text-slate-700 dark:text-white mb-2">Smart Parking System</h1>
        <p class="text-slate-500 dark:text-slate-300 mb-6 font-medium">Welcome to the Smart Parking System! Find an empty slot and park.</p>
        
        <div class="flex flex-col md:flex-row gap-3 justify-center mb-4">
            <select id="typeInput" title="Select Vehicle Type" class="px-4 py-3 border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg focus:outline-none focus:border-blue-500">
                <option value="Car">🚗 Car</option>
                <option value="Bike">🏍️ Bike</option>
            </select>
            
            <input type="text" id="plateInput" placeholder="License Plate (MH-31...)" 
                class="w-full md:w-1/3 px-4 py-3 border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg focus:outline-none focus:border-blue-500">
            
            <input type="tel" id="phoneInput" placeholder="Phone No. (+91...)" 
                class="w-full md:w-1/3 px-4 py-3 border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg focus:outline-none focus:border-blue-500">
            
            <button onclick="parkVehicle()" 
                    class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition-all active:scale-95">
                Park
            </button>
        </div>

        <p id="message" class="h-6 font-bold text-sm mb-4"></p>
        <div id="fullMessage" class="hidden flex-col items-center justify-center mb-6 w-full gap-3">
            <p class="text-red-500 font-bold text-center">Parking is completely full!</p>
            <button id="expandBtn" onclick="expandCapacity(5)" class="px-5 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 border border-indigo-200 text-sm font-bold rounded-xl transition-all shadow-sm active:scale-95 flex items-center gap-2">
                <span>+ Add 5 Overflow Slots</span>
            </button>
        </div>
        <div id="parkingGrid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-4 mt-6"></div>

        <div class="mt-8">
            <a href="admin.html" class="text-blue-500 hover:text-blue-400 font-semibold hover:underline transition-colors">Go to Admin Panel &rarr;</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
